<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
<head>

    <!-- 전술 스타일링 엔진: Tailwind CSS -->

    <!-- 지휘 통제 엔진: React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 미래지향적 폰트 시스템 -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --brand-cyan: #06b6d4;
            --brand-blue: #3b82f6;
            --bg-dark: #020617;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-dark);
            color: #f1f5f9;
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;

        .glass-panel {
            background: rgba(15, 23, 42, 0.9);

            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .text-neon {
            background: linear-gradient(to right, #06b6d4, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

        .bg-grid {
            background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0);
            background-size: 30px 30px;
        }

        .hero-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* 유닛 카드 반응성 */
        .unit-card {

        }

            .unit-card:hover {

                border-color: var(--brand-cyan);
                box-shadow: 0 25px 50px -12px rgba(6, 182, 212, 0.3);
            }

            0% { transform: translateY(-100%); }

            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--brand-cyan), transparent);

</head>

                                    <div className="space-y-12 md:space-y-16">

                            <div className="text-center md:text-left">

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
